<html>
<head>
    <title>Registration Form</title>
    <script>
        function validateForm() {
            var firstName = document.getElementById("firstName").value.trim();
            var lastName = document.getElementById("lastName").value.trim();
            var password = document.getElementById("password").value;
            var email = document.getElementById("email").value.trim();
            var mobile = document.getElementById("mobile").value.trim();
            var address = document.getElementById("address").value.trim();

            var namePattern = /^[A-Za-z]+$/;
            if (!namePattern.test(firstName) || firstName.length < 4) {
                alert("First Name must contain only alphabets and be at least 4  characters long.");
                return false;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return false;
            }

            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert("Please enter a valid Email ID (example: name@domain.com).");
                return false;
            }

            var mobilePattern = /^[0-9]{10}$/;
            if (!mobilePattern.test(mobile)) {
                alert("Mobile Number must contain exactly 10 digits.");
                return false;
            }


            if (lastName === "") {
                alert("Last Name cannot be empty.");
                return false;
            }

            if (address === "") {
                alert("Address cannot be empty.");
                return false;
            }

            alert("Registration Successful!");
            return true;
        }
    </script>
</head>
<body>

    <h2>Registration Form</h2>

    <form onsubmit="return validateForm()">
        First Name: <input type="text" id="firstName"><br><br>
        Last Name: <input type="text" id="lastName"><br><br>
        Password: <input type="password" id="password"><br><br>
        Email: <input type="text" id="email"><br><br>
        Mobile Number: <input type="text" id="mobile"><br><br>
        Address: <textarea id="address"></textarea><br><br>
        <input type="submit" value="Register">
    </form>

</body>
</html>
