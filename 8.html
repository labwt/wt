<!DOCTYPE html>
<html>
<head>
    <title>Image Slider</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 24px;
        }

        #slider {
            width: 500px;
            height: 300px;
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        #slider img {
            width: 100%;
            height: 100%;
            display: none;
            object-fit: cover;
        }

        #slider img.active {
            display: block;
        }

        button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px;
            border: 0;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.82);
            cursor: pointer;
        }

        #prev { left: 10px; }
        #next { right: 10px; }

        .dots {
            margin-top: 16px;
        }

        .dots button {
            position: static;
            transform: none;
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div id="slider">
    <img alt="Slide 1" src="" class="active">
    <img alt="Slide 2" src="">
    <img alt="Slide 3" src="">

    <button id="prev" type="button">Prev</button>
    <button id="next" type="button">Next</button>
</div>

<br>

<div class="dots">
    <button type="button" onclick="show(0)">1</button>
    <button type="button" onclick="show(1)">2</button>
    <button type="button" onclick="show(2)">3</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let i = 0;
    let imgs = document.querySelectorAll("#slider img");
    let n = imgs.length;

    function show(x) {
        imgs[i].classList.remove("active");
        i = x;
        imgs[i].classList.add("active");
    }

    document.getElementById("prev").onclick = function() {
        show((i - 1 + n) % n);
    };

    document.getElementById("next").onclick = function() {
        show((i + 1) % n);
    };

    setInterval(function() {
        show((i + 1) % n);
    }, 3000);

    window.show = show;
});
</script>

</body>
</html>
